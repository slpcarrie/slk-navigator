<!DOCTYPE html>

<title>SLK Note Builder</title>

<div id="root"></div>

<!-- React + Babel via CDN — no build step needed -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<!--
  IMPORTANT: set this to your deployed backend URL before publishing.
  If your backend (Vercel project) and this page are on the SAME domain, you can leave this as "/api/generate".
  If they're on DIFFERENT domains (e.g. this page is on GitHub Pages, backend is on Vercel),
  set the full URL here, e.g.:
  window.SLK_API_URL = "https://your-project-name.vercel.app/api/generate";
-->
<script>
  window.SLK_API_URL = "https://slk-note-builder-deploy.vercel.app/api/generate";
