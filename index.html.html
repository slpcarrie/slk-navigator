let state = { area: null, sub: null };

function render() {
  const bc = document.getElementById('breadcrumb');
  const back = document.getElementById('back-area');
  const content = document.getElementById('content');
  bc.innerHTML = '';
  back.innerHTML = '';
  if (!state.area) {
    bc.innerHTML = '<span>Goal areas</span>';
    content.innerHTML = renderAreas();
  } else if (!state.sub) {
    const area = data.areas.find(a => a.id === state.area);
    bc.innerHTML = `<span style="cursor:pointer;color:var(--color-text-secondary);" onclick="goHome()">Goal areas</span><span class="sep">›</span><span>${area.name}</span>`;
    back.innerHTML = `<button class="back-btn" onclick="goHome()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button>`;
    content.innerHTML = renderSubs(area);
  } else {
    const area = data.areas.find(a => a.id === state.area);
    const sub = area.subs.find(s => s.id === state.sub);
    bc.innerHTML = `<span style="cursor:pointer;color:var(--color-text-secondary);" onclick="goHome()">Goal areas</span><span class="sep">›</span><span style="cursor:pointer;color:var(--color-text-secondary);" onclick="goArea()">${area.name}</span><span class="sep">›</span><span>${sub.name}</span>`;
    back.innerHTML = `<button class="back-btn" onclick="goArea()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button>`;
    content.innerHTML = renderGoals(sub);
  }
}

function renderAreas() {
  return `<div class="section-label">Choose a goal area</div><div class="cards">${data.areas.map(a => {
    const uc = a.underConstruction;
    return `<div class="card${uc ? ' under-construction' : ''}" onclick="${uc ? '' : `selectArea('${a.id}')`}">
      ${uc ? '<div class="badge badge-construction">Under construction</div>' : ''}
      <div class="card-name">${a.name}</div>
      <div class="card-desc">${a.desc}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderSubs(area) {
  return `<div class="section-label">Choose a sub-area</div><div class="cards">${area.subs.map(s =>
    `<div class="card" onclick="selectSub('${s.id}')">
      <div class="card-name">${s.name}</div>
      <div class="card-desc">${s.desc}</div>
    </div>`
  ).join('')}</div>`;
}

function renderGoals(sub) {
  let html = '';
  if (sub.note) html += `<div class="note">${sub.note}</div>`;
  html += `<div class="section-label">Choose a level — click to open the goal packet</div>`;
  const levelClass = { Beginner: 'level-beginner', Intermediate: 'level-intermediate', Advanced: 'level-advanced' };
  html += sub.goals.map(g =>
    `<div class="goal-card">
      <div class="level ${levelClass[g.level]}">${g.level}</div>
      <div class="goal-text">${g.text}</div>
      <a class="goal-link" href="${sub.url}" target="_blank" rel="noopener">
        <i class="ti ti-download" aria-hidden="true"></i> Open ${g.level} Goal Packet
      </a>
    </div>`
  ).join('');
  return html;
}

function selectArea(id) { state = { area: id, sub: null }; render(); }
function selectSub(id) { state.sub = id; render(); }
function goHome() { state = { area: null, sub: null }; render(); }
function goArea() { state.sub = null; render(); }

render();
</script>
